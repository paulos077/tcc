<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro Assustador</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        form {
            background-color: #1e1e1e;
            padding: 20px 50px 20px 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px #8b0000, 0 0 10px rgba(0,0,0,0.5);
            position: relative;
        }

        h2 {
            color: #ff0000;
            text-align: center;
            font-family: 'Creepster', cursive, Arial, sans-serif;
            text-shadow: 0 0 10px #8b0000, 0 0 5px #fff;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        label {
            display: block;
            margin-bottom: 5px;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            border: 1px solid #333;
            border-radius: 4px;
            background-color: #333;
            color: #e0e0e0;
        }

        .button-skulls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
        }

        input[type="submit"] {
            background-color: #8b0000;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1em;
            box-shadow: 0 0 10px #8b0000;
            transition: background 0.3s;
        }

        input[type="submit"]:hover {
            background-color: #ff0000;
            color: #000;
        }

        .login-link {
            display: block;
            margin-top: 18px;
            color: #ff0000;
            text-align: center;
        }

        .login-link a {
            color: #fff;
            text-decoration: underline;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Creepster&display=swap" rel="stylesheet">
</head>
<body>
   <form action="cadastro.php" method="post">     
<h2>Cadastro</h2>
        <label for="nome">Nome:</label>
        <input type="text" id="nome" name="nome" required>

        <label for="email">E-mail:</label>
        <input type="email" id="email" name="email" required>

        <label for="senha">Senha:</label>
        <input type="password" id="senha" name="senha" required>

        <div class="button-skulls">
            <input type="submit" value="Cadastrar">
        </div>
        <div class="login-link">
            Já tem conta? <a href="login.html">Entrar</a>
        </div>
    </form>
</body>
</html>
